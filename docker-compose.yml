name: local-assistant

# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#
#   Tauri desktop mode (default):
#     docker compose up --build
#     pnpm --filter @local-assistant/desktop tauri dev
#
#   Web mode (browser only, no Rust needed):
#     docker compose --profile web up --build
#     Open http://localhost:8080
#
# In both modes Ollama must be running on the host at port 11434.
# On Linux, set OLLAMA_URL=http://172.17.0.1:11434 in a .env file if
# host.docker.internal is not available.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── SearXNG (local web search) ────────────────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    environment:
      SEARXNG_BASE_URL: "http://localhost:8888/"
    volumes:
      - ./docker/searxng:/etc/searxng:rw
    ports:
      - "8888:8080"

  # ── Backend (Node.js / tRPC) ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    depends_on:
      - searxng
    environment:
      PORT: "3001"
      NODE_ENV: production
      # Reach the host's Ollama instance. Override with a .env file on Linux.
      OLLAMA_URL: "${OLLAMA_URL:-http://host.docker.internal:11434}"
      SEARXNG_URL: "http://searxng:8080"
      # The host-side path of the mounted data volume, so the backend can
      # return file paths that are valid on the user's machine (not the container).
      HOST_DATA_DIR: "${LOCAL_ASSISTANT_DATA:-$HOME/LocalAssistant}"
    volumes:
      # Persist the SQLite DB and indexed chat files on the host
      - "${LOCAL_ASSISTANT_DATA:-$HOME/LocalAssistant}:/root/LocalAssistant"
    ports:
      # Exposed for Tauri mode (desktop app connects directly)
      - "3001:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Frontend (nginx serving the built React app) — web mode only ──────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # In web mode nginx proxies /trpc → backend, so the browser only needs
        # to talk to itself (same origin). No CORS, no exposed 3001 needed.
        VITE_BACKEND_URL: ""
        VITE_WS_URL: ""
    profiles: ["web"]
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
